<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Float</title>
    <style>
      .container {
        width: 600px;
        border: 1px solid gray;
      }
      img {
        width: 200px;
      }
      .float-left {
        float: left;
        margin-right: 10px;
        margin-bottom: 10px;
      }
      .float-right {
        float: right;
      }
      p {
        border: 1px solid blue;
      }
      .clear {
        clear: both;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img class="float-left" src="../assets/images/ice-1.jpg" alt="" />
      <p>
        빙수(氷水, 영어: shaved ice, 문화어: 단얼음)는 잘게 부순 얼음에 당밀
        또는 설탕과 그밖의 감미료를 섞은 얼음과자이다. 과거에는 천연 얼음이
        주재료로 쓰였지만 나중에는 인조 얼음이 생산되고 양질의 감미료가
        개발되면서,
      </p>
      <p class="clear">
        빙수(氷水, 영어: shaved ice, 문화어: 단얼음)는 잘게 부순 얼음에 당밀
        또는 설탕과 그밖의 감미료를 섞은 얼음과자이다. 과거에는 천연 얼음이
        주재료로 쓰였지만 나중에는 인조 얼음이 생산되고 양질의 감미료가
        개발되면서,
      </p>
    </div>
  </body>
</html>
